name: Deploy Node App to EC2

on:
  push:
    branches:
      - main
    # Sirf zaroori files ke change hone par workflow chalega
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'LICENSE'
      - '**.md'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 3.6.40.20
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # Script ko clean aur efficient banaya gaya hai
          script: |
            cd nodejs-docker-compose-api
            git pull origin main
            
            # --build: Nayi image banayega agar code change hua hai
            # -d: Background mein chalayega
            # --remove-orphans: Purane unused containers ko hata dega
            docker-compose up -d --build --remove-orphans
            
            # Optional: Purani images clean karne ke liye (disk space bachegi)
            docker image prune -f
